version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: smart_tourism_postgres
    restart: always
    environment:
      POSTGRES_DB: smart_tourism_360
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - smart-tourism-network

  minio:
    image: minio/minio
    container_name: smart_tourism_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secure_pass
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    networks:
      - smart-tourism-network

  minio-init:
    image: minio/mc
    container_name: smart_tourism_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin_secure_pass;
      /usr/bin/mc mb --ignore-existing myminio/smart-tourism-media;
      /usr/bin/mc anonymous set public myminio/smart-tourism-media;
      exit 0;
      "
    networks:
      - smart-tourism-network

volumes:
  postgres_data_dev:
    driver: local
  minio_data_dev:
    driver: local

networks:
  smart-tourism-network:
    driver: bridge
