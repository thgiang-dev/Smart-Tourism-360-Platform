<!DOCTYPE html>
<html>
<head>
  <title>Test Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    model-viewer {
      width: 600px;
      height: 400px;
      background-color: #111;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Test Model Viewer - Standalone</h1>
  <p>Replace the src below with your MinIO model URL:</p>
  
  <model-viewer
    id="viewer"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
  >
    <div slot="poster" style="background:#333;color:white;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">
      Loading...
    </div>
  </model-viewer>

  <br>
  <label>Custom URL: <input id="urlInput" type="text" style="width:500px" placeholder="http://localhost:9000/smart-tourism-media/media/..."></label>
  <button onclick="document.getElementById('viewer').src = document.getElementById('urlInput').value">Load</button>
</body>
</html>
